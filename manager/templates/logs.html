<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Daeploy — {{ title }} logs</title>
  <link rel="icon" href="/assets/favicon.ico">
  <link rel="stylesheet" href="/assets/tokens.css">
  <style>
    html,body{height:100%;}
    body{background:var(--ground);color:var(--text);font-family:var(--sans);margin:0;
      display:flex;flex-direction:column;min-height:100vh;}

    /* ---------- top bar ---------- */
    .top{
      display:flex;align-items:center;justify-content:space-between;gap:1rem;
      padding:1.05rem 1.6rem;border-bottom:1px solid var(--line-soft);
      background:linear-gradient(180deg,rgba(22,28,44,.6),transparent);
    }
    .top .left{display:flex;align-items:center;gap:1.1rem}
    .mark{display:inline-flex;align-items:center;gap:.6rem}
    .mark svg{display:block}
    .wordmark{font-weight:600;font-size:1.4rem;letter-spacing:-.02em;}
    .wordmark b{color:var(--accent);font-weight:600}
    .vchip{
      font-family:var(--mono);font-size:11px;letter-spacing:.08em;color:var(--muted);
      border:1px solid var(--line);border-radius:999px;padding:.2rem .6rem;
    }
    .vchip b{color:var(--accent);font-weight:600}
    .actions{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
    .act{
      font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;
      color:var(--muted);background:transparent;border:1px solid var(--line);
      border-radius:8px;padding:.42rem .7rem;cursor:pointer;text-decoration:none;
      transition:color .15s,border-color .15s,background .15s;display:inline-block;
    }
    .act:hover{color:var(--text);border-color:var(--accent-dim)}
    .act.danger:hover{color:var(--crit);border-color:var(--crit)}

    .page{flex:1;min-height:0;display:flex;padding:1.2rem 1.6rem 1.6rem;}

    .panel{
      background:var(--surface);border:1px solid var(--line-soft);border-radius:16px;
      overflow:hidden;flex:1;display:flex;flex-direction:column;min-height:0;width:100%;
    }

    /* ---------- service status dot ---------- */
    .sdot{width:8px;height:8px;border-radius:50%;flex:none}
    .sdot.run{background:var(--ok);box-shadow:0 0 0 3px rgba(61,220,151,.15)}
    .sdot.run.live{animation:pulse 2.4s ease-in-out infinite}

    /* ---------- logs view ---------- */
    .logs-head{
      display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;
      padding:1rem 1.2rem .9rem;border-bottom:1px solid var(--line-soft);
    }
    .logs-head .ctx{display:flex;align-items:center;gap:.6rem;min-width:0}
    .logs-head .ctx .name{font-weight:560;font-size:.96rem}
    .logs-head .ctx .ver{font-family:var(--mono);font-size:11px;color:var(--muted)}
    .live-tag{
      display:inline-flex;align-items:center;gap:.45rem;
      font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;
      color:var(--ok);
    }
    .live-tag .d{width:7px;height:7px;border-radius:50%;background:var(--ok);
      box-shadow:0 0 0 3px rgba(61,220,151,.15);animation:pulse 2.4s ease-in-out infinite}
    .live-tag.paused{color:var(--faint)}
    .live-tag.paused .d{background:var(--faint);box-shadow:none;animation:none}
    .logs-tools{display:flex;align-items:center;gap:.9rem}

    /* follow switch */
    .follow{display:inline-flex;align-items:center;gap:.55rem;cursor:pointer;user-select:none}
    .follow input{position:absolute;opacity:0;width:0;height:0}
    .track{
      width:38px;height:21px;border-radius:999px;background:var(--surface-2);
      border:1px solid var(--line);position:relative;transition:background .15s,border-color .15s;
    }
    .track::after{
      content:"";position:absolute;top:2px;left:2px;width:15px;height:15px;border-radius:50%;
      background:var(--faint);transition:transform .16s,background .16s;
    }
    .follow input:checked + .track{background:rgba(94,230,208,.18);border-color:var(--accent-dim)}
    .follow input:checked + .track::after{transform:translateX(17px);background:var(--accent)}
    .follow input:focus-visible + .track{box-shadow:0 0 0 3px rgba(94,230,208,.22)}
    .follow .flabel{
      font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);
    }
    .follow input:checked ~ .flabel{color:var(--text)}

    .console-wrap{position:relative;flex:1;min-height:0;display:flex;}
    .console{
      flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;
      font-family:var(--mono);font-size:12.5px;line-height:1.7;
      padding:.6rem 0;background:
        linear-gradient(180deg,rgba(94,230,208,.025),transparent 120px);
      scrollbar-width:thin;scrollbar-color:var(--line) transparent;
    }
    .console::-webkit-scrollbar{width:10px}
    .console::-webkit-scrollbar-thumb{background:var(--line);border-radius:6px;border:3px solid var(--surface)}
    .logline{
      display:grid;grid-template-columns:auto auto 1fr;gap:.85rem;align-items:baseline;
      padding:.06rem 1.2rem;white-space:pre-wrap;word-break:break-word;
    }
    .logline:hover{background:var(--surface-2)}
    .logline.err{background:rgba(242,88,91,.06);box-shadow:inset 3px 0 0 var(--crit)}
    .logline.warn{box-shadow:inset 3px 0 0 var(--warn)}

    .jump{
      position:absolute;left:50%;bottom:.9rem;transform:translateX(-50%) translateY(8px);
      display:inline-flex;align-items:center;gap:.4rem;
      background:var(--accent);color:var(--accent-ink);border:none;border-radius:999px;
      padding:.42rem .95rem;font-family:var(--mono);font-size:11px;letter-spacing:.08em;
      text-transform:uppercase;font-weight:650;cursor:pointer;box-shadow:var(--shadow);
      opacity:0;pointer-events:none;transition:opacity .18s,transform .18s;
    }
    .jump.show{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0)}

    @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(61,220,151,.45)}50%{box-shadow:0 0 0 6px rgba(61,220,151,0)}}

    @media (max-width:760px){
      .top{flex-direction:column;align-items:flex-start;gap:.9rem}
    }
    @media (prefers-reduced-motion:reduce){
      .sdot.run.live{animation:none}
      .live-tag .d{animation:none}
    }
  </style>
</head>
<body>
  <header class="top">
    <div class="left">
      <div class="mark">
        <img src="/assets/daeploy_mark.svg" width="26" height="26" alt="">
        <span class="wordmark">dae<b>ploy</b></span>
      </div>
      <span class="vchip">manager <b>v: {{ manager_version }}</b></span>
    </div>
    <nav class="actions">
      <a class="act" href="/dashboard/">&larr; Services</a>
      <a class="act" href="/docs">API Docs</a>
      <a class="act danger" href="/auth/logout">Log out</a>
    </nav>
  </header>
  <div class="page">
    <section class="panel">
      <div class="logs-head">
        <div class="ctx"><span class="sdot run live"></span>
          <span class="name">{{ title }}</span><span class="ver">{{ subtitle }}</span></div>
        <div class="logs-tools">
          <span class="live-tag" id="liveTag"><span class="d"></span><span id="liveLabel">Live</span></span>
          <label class="follow" title="Auto-scroll to newest logs">
            <input type="checkbox" id="followBox" checked>
            <span class="track" aria-hidden="true"></span><span class="flabel">Follow</span>
          </label>
        </div>
      </div>
      <div class="console-wrap">
        <div class="console" id="console" tabindex="0" role="log" aria-live="off"></div>
        <button class="jump" id="jumpBtn" onclick="jumpToLatest()">Jump to latest &darr;</button>
      </div>
    </section>
  </div>
  <script>
    var STREAM_URL = "{{ stream_url|safe }}";
    var consoleEl=document.getElementById('console'),
        followBox=document.getElementById('followBox'),
        jumpBtn=document.getElementById('jumpBtn'),
        liveTag=document.getElementById('liveTag');
    function nearBottom(){return consoleEl.scrollHeight-consoleEl.scrollTop-consoleEl.clientHeight<24;}
    function setLive(on){liveTag.classList.toggle('paused',!on);document.getElementById('liveLabel').textContent=on?'Live':'Paused';}
    function classify(line){var u=line.toUpperCase();
      if(u.indexOf('ERROR')>-1||u.indexOf('CRITICAL')>-1)return'err';
      if(u.indexOf('WARN')>-1)return'warn';return'info';}
    function appendLine(text){
      if(!text)return;
      var lvl=classify(text), row=document.createElement('div');
      row.className='logline'+(lvl==='err'?' err':lvl==='warn'?' warn':'');
      row.textContent=text;            // textContent = safe, no XSS from log content
      consoleEl.appendChild(row);
      while(consoleEl.childElementCount>400)consoleEl.removeChild(consoleEl.firstChild);
      if(followBox.checked)consoleEl.scrollTop=consoleEl.scrollHeight; else jumpBtn.classList.add('show');
    }
    function jumpToLatest(){followBox.checked=true;setLive(true);consoleEl.scrollTop=consoleEl.scrollHeight;jumpBtn.classList.remove('show');}
    followBox.addEventListener('change',function(){setLive(followBox.checked);
      if(followBox.checked){consoleEl.scrollTop=consoleEl.scrollHeight;jumpBtn.classList.remove('show');}});
    consoleEl.addEventListener('scroll',function(){
      if(followBox.checked&&!nearBottom()){followBox.checked=false;setLive(false);jumpBtn.classList.add('show');}
      else if(!followBox.checked&&nearBottom()){jumpBtn.classList.remove('show');}});
    // stream the real endpoint
    (async function(){
      try{
        var resp=await fetch(STREAM_URL,{headers:{'Accept':'text/plain'}});
        var reader=resp.body.getReader(), dec=new TextDecoder(), buf='';
        while(true){
          var r=await reader.read(); if(r.done)break;
          buf+=dec.decode(r.value,{stream:true});
          var lines=buf.split('\n'); buf=lines.pop();
          lines.forEach(appendLine);
        }
        if(buf)appendLine(buf);
        setLive(false);
      }catch(e){appendLine('— log stream ended —');setLive(false);}
    })();
  </script>
</body>
</html>
